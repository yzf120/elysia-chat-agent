syntax = "proto3";

package trpc.elysia.chat_agent.agent;
option go_package="github.com/yzf120/elysia-chat-agent/proto/agent";

service AgentService {
  rpc CreateAgent (CreateAgentRequest) returns (CreateAgentResponse) {}
  rpc GetAgent (GetAgentRequest) returns (GetAgentResponse) {}
  rpc UpdateAgent (UpdateAgentRequest) returns (UpdateAgentResponse) {}
  rpc DeleteAgent (DeleteAgentRequest) returns (DeleteAgentResponse) {}
  rpc ExecuteAgent (ExecuteAgentRequest) returns (ExecuteAgentResponse) {}

  // 流式对话接口（Agent处理后流式返回）
  rpc StreamChat (AgentStreamChatRequest) returns (stream AgentStreamChatResponse) {}
}

// ===== 流式对话消息 =====

// 对话消息
message AgentChatMessage {
  string role = 1;    // system, user, assistant
  string content = 2; // 消息内容
}

// 流式对话请求
message AgentStreamChatRequest {
  string model_id = 1;                    // 模型ID，如 "doubao-seed-1-6-lite-251015"
  repeated AgentChatMessage messages = 2; // 对话历史（含本次用户消息）
  string system_prompt = 3;               // 系统提示词（可选，会插入到消息最前面）
  map<string, string> extra_params = 4;   // 额外参数
}

// 流式对话响应（每个chunk）
message AgentStreamChatResponse {
  string content = 1;   // 本次增量内容
  bool is_end = 2;      // 是否是最后一个chunk
  string finish_reason = 3; // 结束原因：stop, length, content_filter
  int32 prompt_tokens = 4;
  int32 completion_tokens = 5;
  int32 total_tokens = 6;
}

// ===== 原有消息类型 =====

message CreateAgentRequest {
  string name = 1;
  string description = 2;
  string agent_type = 3;
  string config = 4; // JSON配置字符串
}

message CreateAgentResponse {
  string agent_id = 1;
  string name = 2;
  string description = 3;
  string agent_type = 4;
  string config = 5;
  string created_at = 6;
}

message GetAgentRequest {
  string agent_id = 1;
}

message GetAgentResponse {
  string agent_id = 1;
  string name = 2;
  string description = 3;
  string agent_type = 4;
  string config = 5;
  string created_at = 6;
  string updated_at = 7;
}

message UpdateAgentRequest {
  string agent_id = 1;
  string name = 2;
  string description = 3;
  string config = 4;
}

message UpdateAgentResponse {
  string agent_id = 1;
  string name = 2;
  string description = 3;
  string config = 4;
  string updated_at = 5;
}

message DeleteAgentRequest {
  string agent_id = 1;
}

message DeleteAgentResponse {
  bool success = 1;
}

message ExecuteAgentRequest {
  string agent_id = 1;
  string input = 2;
  map<string, string> parameters = 3;
}

message ExecuteAgentResponse {
  string agent_id = 1;
  string output = 2;
  string execution_id = 3;
  string executed_at = 4;
  string status = 5;
}